<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>APAC City Resilience Copilot</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=Noto+Nastaliq+Urdu:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
  :root {
    /* ---- Design tokens ---- */
    --bg-deep: #0A0E17;
    --bg-panel: #121826;
    --bg-panel-raised: #171F30;
    --sidebar-grad-top: #1B1035;
    --sidebar-grad-bot: #0D0A18;
    --border: #232D40;
    --border-soft: #1A2233;

    --accent-cyan: #22D3EE;
    --accent-cyan-dim: #0E7490;
    --accent-purple: #A855F7;
    --accent-purple-dim: #6D28D9;
    --accent-purple-glow: rgba(168,85,247,0.35);

    --status-critical: #F87171;
    --status-critical-bg: rgba(248,113,113,0.12);
    --status-moderate: #FBBF24;
    --status-moderate-bg: rgba(251,191,36,0.12);
    --status-good: #34D399;
    --status-good-bg: rgba(52,211,153,0.12);

    --text-primary: #E8ECF2;
    --text-secondary: #8B95AB;
    --text-faint: #5B6579;

    --radius: 10px;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-urdu: 'Noto Nastaliq Urdu', serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: var(--font-body);
    min-height: 100vh;
  }

  #root { display: flex; min-height: 100vh; }

  /* ---- Sidebar ---- */
  .sidebar {
    width: 232px;
    flex-shrink: 0;
    background: linear-gradient(180deg, var(--sidebar-grad-top) 0%, var(--sidebar-grad-bot) 100%);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 24px 16px;
  }

  .brand {
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.2px;
    color: var(--text-primary);
    margin-bottom: 2px;
  }
  .brand-sub {
    font-size: 11px;
    color: var(--accent-cyan);
    font-family: var(--font-mono);
    letter-spacing: 0.5px;
    margin-bottom: 32px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: var(--radius);
    color: var(--text-secondary);
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    margin-bottom: 4px;
    transition: background 0.15s, color 0.15s;
    border: 1px solid transparent;
  }
  .nav-item:hover { background: rgba(168,85,247,0.10); color: var(--text-primary); }
  .nav-item.active {
    background: rgba(168,85,247,0.16);
    border-color: rgba(168,85,247,0.5);
    color: var(--text-primary);
    box-shadow: 0 0 16px var(--accent-purple-glow);
  }
  .nav-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-purple); flex-shrink: 0; }

  .sidebar-footer {
    margin-top: auto;
    font-size: 10.5px;
    color: var(--text-faint);
    font-family: var(--font-mono);
    line-height: 1.6;
    padding-top: 16px;
    border-top: 1px solid var(--border-soft);
  }
  .api-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 6px; }

  /* ---- Main ---- */
  .main { flex: 1; padding: 28px 36px; overflow-y: auto; }
  .page-title {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .page-sub { color: var(--text-secondary); font-size: 13px; margin-bottom: 24px; }

  /* ---- KPI cards ---- */
  .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
  .kpi-card {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
  }
  .kpi-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }
  .kpi-value { font-family: var(--font-display); font-size: 26px; font-weight: 700; }
  .kpi-value.cyan { color: var(--accent-cyan); }
  .kpi-value.purple { color: var(--accent-purple); }
  .kpi-value.critical { color: var(--status-critical); }

  /* ---- Ward grid + gauge ---- */
  .content-grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; margin-bottom: 24px; }
  .panel {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
  }
  .panel-title {
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-title .refresh-btn {
    font-size: 11px;
    color: var(--accent-cyan);
    cursor: pointer;
    font-family: var(--font-mono);
    background: none;
    border: 1px solid var(--accent-cyan-dim);
    border-radius: 6px;
    padding: 4px 10px;
  }
  .panel-title .refresh-btn:hover { background: rgba(34,211,238,0.08); }

  .ward-list { display: flex; flex-direction: column; gap: 8px; max-height: 360px; overflow-y: auto; }
  .ward-row {
    display: grid;
    grid-template-columns: 1fr auto 70px;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    background: var(--bg-panel-raised);
    border: 1px solid var(--border-soft);
    border-radius: 8px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .ward-row:hover { border-color: var(--accent-purple-dim); }
  .ward-row.selected { border-color: var(--accent-purple); background: rgba(168,85,247,0.08); box-shadow: 0 0 12px rgba(168,85,247,0.15); }
  .ward-name { font-size: 13px; font-weight: 500; }
  .ward-id { font-size: 10.5px; color: var(--text-faint); font-family: var(--font-mono); }
  .risk-bar-track { width: 100px; height: 5px; background: var(--border-soft); border-radius: 4px; overflow: hidden; }
  .risk-bar-fill { height: 100%; border-radius: 4px; }
  .risk-score-num { font-family: var(--font-mono); font-size: 13px; text-align: right; }

  /* radial gauge */
  .gauge-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 12px 0; }
  .gauge-svg-wrap { position: relative; width: 180px; height: 180px; }
  .gauge-value {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    font-size: 32px;
    font-weight: 700;
  }
  .gauge-caption { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }

  /* ---- status pills ---- */
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10.5px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 20px;
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .pill.critical { background: var(--status-critical-bg); color: var(--status-critical); }
  .pill.moderate { background: var(--status-moderate-bg); color: var(--status-moderate); }
  .pill.good { background: var(--status-good-bg); color: var(--status-good); }
  .pill-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

  /* ---- Advisory / bridge panel (signature element) ---- */
  .bridge-panel {
    display: grid;
    grid-template-columns: 1fr 44px 1fr;
    gap: 0;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 20px;
  }
  .bridge-side { padding: 20px; }
  .bridge-side.data-side { border-right: 1px solid var(--border); }
  .bridge-side.data-side .side-label { color: var(--accent-cyan); }
  .bridge-side.human-side .side-label { color: var(--accent-purple); }
  .side-label {
    font-family: var(--font-mono);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }
  .bridge-arrow {
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, rgba(34,211,238,0.06), rgba(139,92,246,0.06));
    color: var(--text-faint);
    font-size: 18px;
  }

  .query-form { display: flex; gap: 8px; margin-bottom: 14px; }
  .query-input {
    flex: 1;
    background: var(--bg-panel-raised);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text-primary);
    font-size: 13px;
    font-family: var(--font-body);
  }
  .query-input:focus { outline: none; border-color: var(--accent-cyan-dim); }
  .btn {
    background: var(--accent-purple);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font-body);
    transition: background 0.15s;
  }
  .btn:hover { background: #7C4CE8; }
  .btn:disabled { background: var(--border); color: var(--text-faint); cursor: not-allowed; }
  .btn.secondary { background: transparent; border: 1px solid var(--accent-cyan-dim); color: var(--accent-cyan); }
  .btn.secondary:hover { background: rgba(34,211,238,0.08); }

  .urdu-answer {
    direction: rtl;
    font-family: var(--font-urdu);
    font-size: 19px;
    line-height: 2.1;
    color: var(--text-primary);
    white-space: pre-wrap;
  }
  .empty-state { color: var(--text-faint); font-size: 13px; font-style: italic; }

  .data-json {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-secondary);
    background: var(--bg-panel-raised);
    border: 1px solid var(--border-soft);
    border-radius: 8px;
    padding: 10px;
    white-space: pre-wrap;
    max-height: 160px;
    overflow-y: auto;
  }

  /* ---- Hazard report form ---- */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-field { display: flex; flex-direction: column; gap: 6px; }
  .form-field label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.4px; }
  .form-field select, .form-field input, .form-field textarea {
    background: var(--bg-panel-raised);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 10px;
    color: var(--text-primary);
    font-size: 13px;
    font-family: var(--font-body);
  }
  .form-field select:focus, .form-field input:focus, .form-field textarea:focus { outline: none; border-color: var(--accent-purple-dim); }
  .hazard-critical-warning {
    font-size: 11.5px;
    color: var(--status-critical);
    background: var(--status-critical-bg);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: 6px;
    padding: 8px 10px;
    margin-bottom: 12px;
  }

  .submission-list { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
  .submission-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 12px;
    background: var(--bg-panel-raised);
    border: 1px solid var(--border-soft);
    border-radius: 8px;
    font-size: 12.5px;
  }
  .submission-meta { color: var(--text-secondary); font-size: 11px; margin-top: 2px; }

  .error-banner {
    background: var(--status-critical-bg);
    border: 1px solid rgba(248,113,113,0.3);
    color: var(--status-critical);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12.5px;
    margin-bottom: 14px;
  }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ---- Satellite map page ---- */
  .map-container {
    height: 560px;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .map-legend {
    display: flex;
    gap: 18px;
    margin-top: 12px;
    font-size: 12px;
    color: var(--text-secondary);
  }
  .map-legend-item { display: flex; align-items: center; gap: 6px; }
  .map-legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .leaflet-popup-content-wrapper {
    background: var(--bg-panel-raised);
    color: var(--text-primary);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .leaflet-popup-tip { background: var(--bg-panel-raised); }
  .leaflet-popup-content { margin: 10px 12px; font-family: var(--font-body); font-size: 12.5px; }
  .map-popup-title { font-family: var(--font-display); font-weight: 600; font-size: 13.5px; margin-bottom: 4px; }
  .map-popup-score { font-family: var(--font-mono); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

/* =========================================================================
   CONFIG — change API_BASE before deploying (e.g. to your Cloud Run URL).
   ========================================================================= */
const API_BASE = "https://resilience-copilot-backend-804820919576.asia-south1.run.app";

/* =========================================================================
   Assumed response shapes — VERIFY against your actual risk.py once live.
   If field names differ, adjust the normalize* functions below only.
   ========================================================================= */
function normalizeWard(raw) {
  return {
    ward_id: raw.ward_id,
    ward_name: raw.ward_name || raw.name || raw.ward_id,
    city_id: raw.city_id || null,
    latitude: raw.latitude ?? null,
    longitude: raw.longitude ?? null,
    flood_risk_score: raw.flood_risk_score ?? raw.risk_score ?? 0,
    is_anomaly: !!raw.is_anomaly,
    anomaly_reason: raw.anomaly_reason || null,
    trend_direction: raw.trend_direction || null,
    predicted_risk_3day: raw.predicted_risk_3day ?? null,
  };
}

const CITY_PREFIX_MAP = { KHI: "Karachi", MNL: "Manila" };
function cityFromWardId(wardId) {
  const prefix = (wardId || "").split("-")[0];
  return CITY_PREFIX_MAP[prefix] || prefix;
}
function deriveCityLabel(wards) {
  const cities = Array.from(new Set(wards.map((w) => cityFromWardId(w.ward_id))));
  return cities.length ? cities.map((c) => c.toUpperCase()).join(" · ") : null;
}

const HAZARD_TYPES = [
  { value: "open_manhole", label: "Open Manhole" },
  { value: "submerged_road", label: "Submerged Road" },
  { value: "broken_road", label: "Broken Road / Pothole" },
  { value: "fallen_tree_branch", label: "Fallen Tree Branch" },
  { value: "exposed_electric_wire", label: "Exposed Electric Wire" },
  { value: "blocked_naala", label: "Blocked Naala / Drain" },
  { value: "stuck_vehicle", label: "Stuck Vehicle" },
  { value: "flooded_underpass", label: "Flooded Underpass" },
];
const CRITICAL_TYPES = ["exposed_electric_wire", "submerged_road", "flooded_underpass"];

function riskColor(score) {
  if (score >= 0.7) return "var(--status-critical)";
  if (score >= 0.4) return "var(--status-moderate)";
  return "var(--status-good)";
}
function riskLevel(score) {
  if (score >= 0.7) return "critical";
  if (score >= 0.4) return "moderate";
  return "good";
}

/* ---- API helpers ---- */
async function apiGet(path) {
  const res = await fetch(`${API_BASE}${path}`);
  if (!res.ok) throw new Error(`GET ${path} failed (${res.status})`);
  return res.json();
}
async function apiPost(path, body) {
  const res = await fetch(`${API_BASE}${path}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  if (!res.ok) {
    const detail = await res.json().catch(() => ({}));
    throw new Error(detail.detail || `POST ${path} failed (${res.status})`);
  }
  return res.json();
}

/* ---- Sidebar ---- */
function Sidebar({ page, setPage, apiOnline, cityLabel }) {
  const items = [
    { id: "dashboard", label: "Risk Dashboard" },
    { id: "map", label: "Satellite Map" },
    { id: "advisory", label: "Public Advisory" },
    { id: "hazard", label: "Hazard Reports" },
  ];
  return (
    <div className="sidebar">
      <div className="brand">City Resilience Copilot</div>
      <div className="brand-sub">{cityLabel || "LOADING…"}</div>
      {items.map((it) => (
        <div
          key={it.id}
          className={`nav-item ${page === it.id ? "active" : ""}`}
          onClick={() => setPage(it.id)}
        >
          <span className="nav-dot" />
          {it.label}
        </div>
      ))}
      <div className="sidebar-footer">
        <span
          className="api-dot"
          style={{ background: apiOnline ? "var(--status-good)" : "var(--status-critical)" }}
        />
        {apiOnline ? "API connected" : "API unreachable"}
        <br />
        {API_BASE}
      </div>
    </div>
  );
}

/* ---- Radial gauge (SVG, no chart library needed) ---- */
function RadialGauge({ value, label }) {
  const pct = Math.max(0, Math.min(1, value));
  const r = 70, circumference = 2 * Math.PI * r;
  const offset = circumference * (1 - pct);
  const color = riskColor(pct);
  return (
    <div className="gauge-wrap">
      <div className="gauge-svg-wrap">
        <svg width="180" height="180" viewBox="0 0 180 180">
          <circle cx="90" cy="90" r={r} fill="none" stroke="var(--border-soft)" strokeWidth="14" />
          <circle
            cx="90" cy="90" r={r} fill="none" stroke={color} strokeWidth="14"
            strokeDasharray={circumference} strokeDashoffset={offset}
            strokeLinecap="round" transform="rotate(-90 90 90)"
            style={{ transition: "stroke-dashoffset 0.6s ease" }}
          />
        </svg>
        <div className="gauge-value" style={{ color }}>{(pct * 100).toFixed(0)}%</div>
      </div>
      <div className="gauge-caption">{label}</div>
    </div>
  );
}

/* ---- Dashboard page ---- */
function DashboardPage({ wards, loading, error, onRefresh, selectedWard, setSelectedWard }) {
  const avgRisk = wards.length
    ? wards.reduce((s, w) => s + w.flood_risk_score, 0) / wards.length
    : 0;
  const highestWard = wards.length
    ? wards.reduce((a, b) => (a.flood_risk_score > b.flood_risk_score ? a : b))
    : null;
  const anomalyCount = wards.filter((w) => w.is_anomaly).length;

  return (
    <div>
      <div className="page-title">Ward Risk Dashboard</div>
      <div className="page-sub">Live flood-risk scores across monitored wards</div>

      {error && <div className="error-banner">{error}</div>}

      <div className="kpi-row">
        <div className="kpi-card">
          <div className="kpi-label">Wards Monitored</div>
          <div className="kpi-value cyan">{wards.length}</div>
        </div>
        <div className="kpi-card">
          <div className="kpi-label">Avg. Risk Score</div>
          <div className="kpi-value" style={{ color: riskColor(avgRisk) }}>{avgRisk.toFixed(2)}</div>
        </div>
        <div className="kpi-card">
          <div className="kpi-label">Highest Risk Ward</div>
          <div className="kpi-value critical" style={{ fontSize: "18px" }}>
            {highestWard ? highestWard.ward_name : "—"}
          </div>
        </div>
        <div className="kpi-card">
          <div className="kpi-label">Active Anomalies</div>
          <div className="kpi-value purple">{anomalyCount}</div>
        </div>
      </div>

      <div className="content-grid">
        <div className="panel">
          <div className="panel-title">
            Wards by Risk
            <button className="refresh-btn" onClick={onRefresh}>
              {loading ? "Loading…" : "Refresh"}
            </button>
          </div>
          <div className="ward-list">
            {wards.length === 0 && !loading && (
              <div className="empty-state">No ward data yet. Check /risk-dashboard on the API.</div>
            )}
            {wards
              .slice()
              .sort((a, b) => b.flood_risk_score - a.flood_risk_score)
              .map((w) => (
                <div
                  key={w.ward_id}
                  className={`ward-row ${selectedWard?.ward_id === w.ward_id ? "selected" : ""}`}
                  onClick={() => setSelectedWard(w)}
                >
                  <div>
                    <div className="ward-name">{w.ward_name}</div>
                    <div className="ward-id">{w.ward_id}</div>
                  </div>
                  <div className="risk-bar-track">
                    <div
                      className="risk-bar-fill"
                      style={{
                        width: `${w.flood_risk_score * 100}%`,
                        background: riskColor(w.flood_risk_score),
                      }}
                    />
                  </div>
                  <div className="risk-score-num" style={{ color: riskColor(w.flood_risk_score) }}>
                    {w.flood_risk_score.toFixed(3)}
                  </div>
                </div>
              ))}
          </div>
        </div>

        <div className="panel">
          <div className="panel-title">
            {selectedWard ? selectedWard.ward_name : "City-wide Risk"}
          </div>
          <RadialGauge
            value={selectedWard ? selectedWard.flood_risk_score : avgRisk}
            label={selectedWard ? "Selected ward risk" : "City average risk"}
          />
          {selectedWard && (
            <div style={{ marginTop: "8px" }}>
              {selectedWard.is_anomaly && (
                <div className="pill critical" style={{ marginBottom: "8px" }}>
                  <span className="pill-dot" /> Anomaly detected
                </div>
              )}
              {selectedWard.anomaly_reason && (
                <div style={{ fontSize: "12px", color: "var(--text-secondary)", marginBottom: "6px" }}>
                  {selectedWard.anomaly_reason}
                </div>
              )}
              {selectedWard.trend_direction && (
                <div style={{ fontSize: "12px", color: "var(--text-secondary)" }}>
                  Trend: <strong style={{ color: "var(--text-primary)" }}>{selectedWard.trend_direction}</strong>
                  {selectedWard.predicted_risk_3day != null && (
                    <> · 3-day projection: <strong style={{ color: "var(--text-primary)" }}>{selectedWard.predicted_risk_3day.toFixed(3)}</strong></>
                  )}
                </div>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ---- Satellite map page ---- */
function MapPage({ wards, selectedWard, setSelectedWard }) {
  const mapRef = React.useRef(null);
  const leafletMapRef = React.useRef(null);
  const markersRef = React.useRef([]);

  const wardsWithCoords = wards.filter(
    (w) => w.latitude != null && w.longitude != null
  );

  // Initialize the Leaflet map once.
  useEffect(() => {
    if (leafletMapRef.current || !mapRef.current) return;

    const map = L.map(mapRef.current, {
      zoomControl: true,
      attributionControl: true,
    }).setView([24.86, 67.05], 6);

    // Esri World Imagery — free satellite basemap, no API key required.
    L.tileLayer(
      "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
      {
        attribution: "Tiles &copy; Esri — Source: Esri, Maxar, Earthstar Geographics",
        maxZoom: 18,
      }
    ).addTo(map);

    leafletMapRef.current = map;

    return () => {
      map.remove();
      leafletMapRef.current = null;
    };
  }, []);

  // Redraw markers whenever the ward list changes.
  useEffect(() => {
    const map = leafletMapRef.current;
    if (!map || wardsWithCoords.length === 0) return;

    markersRef.current.forEach((m) => map.removeLayer(m));
    markersRef.current = [];

    const bounds = [];
    wardsWithCoords.forEach((w) => {
      const color = riskColor(w.flood_risk_score);
      const icon = L.divIcon({
        className: "",
        html: `<div style="
          width: 18px; height: 18px; border-radius: 50%;
          background: ${color}; border: 2px solid rgba(255,255,255,0.85);
          box-shadow: 0 0 10px ${color};
        "></div>`,
        iconSize: [18, 18],
        iconAnchor: [9, 9],
      });

      const marker = L.marker([w.latitude, w.longitude], { icon }).addTo(map);
      marker.bindPopup(`
        <div class="map-popup-title">${w.ward_name}</div>
        <div class="map-popup-score">Risk score: <strong>${w.flood_risk_score.toFixed(3)}</strong></div>
        <div style="margin-top:4px; color: var(--text-secondary);">${w.ward_id}${w.is_anomaly ? " · ⚠ anomaly" : ""}</div>
      `);
      marker.on("click", () => setSelectedWard(w));
      markersRef.current.push(marker);
      bounds.push([w.latitude, w.longitude]);
    });

    if (bounds.length > 0) {
      map.fitBounds(bounds, { padding: [40, 40], maxZoom: 12 });
    }
  }, [wards]);

  // Pan to a ward when selected from elsewhere (e.g. dashboard list).
  useEffect(() => {
    const map = leafletMapRef.current;
    if (map && selectedWard && selectedWard.latitude != null) {
      map.flyTo([selectedWard.latitude, selectedWard.longitude], 13, { duration: 0.8 });
    }
  }, [selectedWard]);

  return (
    <div>
      <div className="page-title">Satellite Risk Map</div>
      <div className="page-sub">Live satellite imagery with ward-level flood risk overlay</div>

      {wardsWithCoords.length < wards.length && wards.length > 0 && (
        <div className="error-banner" style={{ background: "rgba(251,191,36,0.1)", borderColor: "rgba(251,191,36,0.3)", color: "var(--status-moderate)" }}>
          {wards.length - wardsWithCoords.length} ward(s) missing coordinates and are not shown on the map.
        </div>
      )}

      <div className="map-container" ref={mapRef}></div>

      <div className="map-legend">
        <div className="map-legend-item">
          <span className="map-legend-dot" style={{ background: "var(--status-good)" }} />
          Low risk (&lt; 0.4)
        </div>
        <div className="map-legend-item">
          <span className="map-legend-dot" style={{ background: "var(--status-moderate)" }} />
          Moderate risk (0.4 – 0.7)
        </div>
        <div className="map-legend-item">
          <span className="map-legend-dot" style={{ background: "var(--status-critical)" }} />
          Critical risk (&gt; 0.7)
        </div>
      </div>
    </div>
  );
}

/* ---- Advisory page — the "bridge" signature element ---- */
function AdvisoryPage({ wards, selectedWard, setSelectedWard }) {
  const [query, setQuery] = useState("Is this ward at high risk right now and why?");
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);

  const ask = useCallback(async () => {
    if (!selectedWard) { setError("Pehle ek ward select karein dashboard se."); return; }
    setLoading(true);
    setError(null);
    try {
      const data = await apiPost("/advisory/public", { ward_id: selectedWard.ward_id, query });
      setResult(data);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  }, [selectedWard, query]);

  return (
    <div>
      <div className="page-title">Public Advisory</div>
      <div className="page-sub">Structured risk data in — plain-language Urdu guidance out</div>

      {error && <div className="error-banner">{error}</div>}

      <div className="form-field" style={{ marginBottom: "14px", maxWidth: "320px" }}>
        <label>Ward</label>
        <select
          value={selectedWard?.ward_id || ""}
          onChange={(e) => setSelectedWard(wards.find((w) => w.ward_id === e.target.value) || null)}
        >
          <option value="">Select a ward…</option>
          {wards.map((w) => (
            <option key={w.ward_id} value={w.ward_id}>{w.ward_name} ({w.ward_id})</option>
          ))}
        </select>
      </div>

      <div className="query-form">
        <input
          className="query-input"
          value={query}
          onChange={(e) => setQuery(e.target.value)}
          placeholder="Ask about this ward's flood risk…"
          onKeyDown={(e) => e.key === "Enter" && ask()}
        />
        <button className="btn" onClick={ask} disabled={loading}>
          {loading ? "Asking…" : "Ask Copilot"}
        </button>
      </div>

      <div className="bridge-panel">
        <div className="bridge-side data-side">
          <div className="side-label">◆ Structured Data</div>
          {result ? (
            <div className="data-json">
{`ward_id: ${result.ward_id}
ward_name: ${result.ward_name}
risk_score: ${result.risk_score}
generated_at: ${result.generated_at}`}
            </div>
          ) : (
            <div className="empty-state">Ask a question to see the underlying data.</div>
          )}
        </div>
        <div className="bridge-arrow">→</div>
        <div className="bridge-side human-side">
          <div className="side-label">◆ Human Guidance (اردو)</div>
          {result ? (
            <div className="urdu-answer">{result.answer_ur}</div>
          ) : (
            <div className="empty-state">Urdu advisory will appear here.</div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ---- Hazard report page ---- */
function HazardPage({ wards, selectedWard, setSelectedWard }) {
  const [hazardType, setHazardType] = useState(HAZARD_TYPES[0].value);
  const [description, setDescription] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [submissions, setSubmissions] = useState([]); // client-side session log only — no GET-all endpoint yet

  const isCritical = CRITICAL_TYPES.includes(hazardType);

  const submit = useCallback(async () => {
    if (!selectedWard) { setError("Pehle ek ward select karein."); return; }
    setLoading(true);
    setError(null);
    try {
      const data = await apiPost("/advisory/hazard-report", {
        ward_id: selectedWard.ward_id,
        hazard_type: hazardType,
        description,
      });
      setSubmissions((prev) => [
        { ...data, hazard_type: hazardType, ward_name: selectedWard.ward_name, time: new Date().toLocaleTimeString() },
        ...prev,
      ]);
      setDescription("");
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  }, [selectedWard, hazardType, description]);

  return (
    <div>
      <div className="page-title">Hazard Reports</div>
      <div className="page-sub">Community warns community — verified through HITL review for critical hazards</div>

      {error && <div className="error-banner">{error}</div>}

      <div className="panel" style={{ marginBottom: "20px" }}>
        <div className="panel-title">Report a Hazard</div>

        <div className="form-grid">
          <div className="form-field">
            <label>Ward</label>
            <select
              value={selectedWard?.ward_id || ""}
              onChange={(e) => setSelectedWard(wards.find((w) => w.ward_id === e.target.value) || null)}
            >
              <option value="">Select a ward…</option>
              {wards.map((w) => (
                <option key={w.ward_id} value={w.ward_id}>{w.ward_name} ({w.ward_id})</option>
              ))}
            </select>
          </div>
          <div className="form-field">
            <label>Hazard Type</label>
            <select value={hazardType} onChange={(e) => setHazardType(e.target.value)}>
              {HAZARD_TYPES.map((h) => (
                <option key={h.value} value={h.value}>{h.label}</option>
              ))}
            </select>
          </div>
        </div>

        {isCritical && (
          <div className="hazard-critical-warning">
            ⚠ This hazard type is life-threatening. It will be flagged as <strong>critical</strong> and
            held for human review (HITL) before appearing in public advisories.
          </div>
        )}

        <div className="form-field" style={{ marginBottom: "14px" }}>
          <label>Description (optional)</label>
          <textarea
            rows="2"
            maxLength="300"
            value={description}
            onChange={(e) => setDescription(e.target.value)}
            placeholder="Briefly describe what you see…"
          />
        </div>

        <button className="btn" onClick={submit} disabled={loading}>
          {loading ? "Submitting…" : "Submit Report"}
        </button>
      </div>

      <div className="panel">
        <div className="panel-title">This Session's Submissions</div>
        {submissions.length === 0 ? (
          <div className="empty-state">No reports submitted yet this session.</div>
        ) : (
          <div className="submission-list">
            {submissions.map((s) => (
              <div key={s.report_id} className="submission-row">
                <div>
                  <div>{HAZARD_TYPES.find((h) => h.value === s.hazard_type)?.label}</div>
                  <div className="submission-meta">{s.ward_name} · {s.time} · report #{s.report_id}</div>
                </div>
                <span className={`pill ${s.status === "pending_review" ? "moderate" : "good"}`}>
                  <span className="pill-dot" />
                  {s.status === "pending_review" ? "Pending Review" : "Auto-Approved"}
                </span>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

/* ---- App shell ---- */
function App() {
  const [page, setPage] = useState("dashboard");
  const [wards, setWards] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [apiOnline, setApiOnline] = useState(false);
  const [selectedWard, setSelectedWard] = useState(null);

  const fetchWards = useCallback(async () => {
    setLoading(true);
    setError(null);
    try {
      const data = await apiGet("/risk-dashboard");
      const list = Array.isArray(data) ? data : data.wards || [];
      const normalized = list.map(normalizeWard);
      setWards(normalized);
      setApiOnline(true);
    } catch (e) {
      setError(`Could not load risk dashboard: ${e.message}. Is the API running at ${API_BASE}?`);
      setApiOnline(false);
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => { fetchWards(); }, [fetchWards]);

  return (
    <React.Fragment>
      <Sidebar page={page} setPage={setPage} apiOnline={apiOnline} cityLabel={deriveCityLabel(wards)} />
      <div className="main">
        {page === "dashboard" && (
          <DashboardPage
            wards={wards} loading={loading} error={error} onRefresh={fetchWards}
            selectedWard={selectedWard} setSelectedWard={setSelectedWard}
          />
        )}
        {page === "map" && (
          <MapPage wards={wards} selectedWard={selectedWard} setSelectedWard={setSelectedWard} />
        )}
        {page === "advisory" && (
          <AdvisoryPage wards={wards} selectedWard={selectedWard} setSelectedWard={setSelectedWard} />
        )}
        {page === "hazard" && (
          <HazardPage wards={wards} selectedWard={selectedWard} setSelectedWard={setSelectedWard} />
        )}
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
